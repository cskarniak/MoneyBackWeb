name: moneyback

services:
  postgres:
    image: postgres:16-alpine
    container_name: moneyback_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moneyback
      POSTGRES_PASSWORD: moneyback
      POSTGRES_DB: moneyback
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyback -d moneyback"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moneyback_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: moneyback_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://moneyback:moneyback@postgres:5432/moneyback
      DATABASE_BACKUPS_DIR: /app/backups
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      API_URL: ${API_URL:-http://localhost:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
    ports:
      - "3001:3001"
    volumes:
      - ${HOME}/Downloads/moneyback_backups:/app/backups

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: moneyback_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
